# Tunable Thresholds for Change Detection

semantic_similarity:
  exact_match: 0.99
  high: 0.88
  medium: 0.72
  low: 0.50
  no_match: 0.30

importance_score:
  critical: [0.85, 1.00]
  high: [0.60, 0.84]
  medium: [0.30, 0.59]
  low: [0.00, 0.29]

confidence_score:
  very_high: [0.90, 1.00]
  high: [0.75, 0.89]
  medium: [0.50, 0.74]
  low: [0.00, 0.49]

magnitude_thresholds:
  numeric_percentage_change: 0.05  # 5% change
  list_size_change: 0.20            # 20% size change
  price_change_dollars: 1.00        # $1 change
  text_length_ratio: 0.30           # 30% length change
